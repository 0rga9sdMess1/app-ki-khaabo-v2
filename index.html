<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Khaabo?</title>

<!--
========================================================
KI KHAABO? - V2.6 EVOLUTION BUILD
(BASE: V1.2.4 STABLE SYSTEM)
========================================================

Ver.2.6.0.15.05.2026.19.20.00 (IST)

CHANGELOG:

UPGRADED FROM V1.2.4 BASE

✔ Added HAPTIC INTERACTION SYSTEM
- short vibration on selection
- long vibration on final decision button

✔ Added FOOD EXPANSION LAYER
- Butter Garlic Rice + Cheese Spinach Sauce
- Spinach Corn Sandwich
- Potato Cucumber Sandwich
- Mango Oats Smoothie (seasonal - May)

✔ Added LIGHT INTELLIGENCE BIAS SYSTEM
- reduced repetition likelihood
- mild mood alignment boost
- weekend preference nudges

✔ Added CONTEXTUAL BREAKFAST ENGINE
- breakfast depends on dinner type
- fallback suggestions if undefined

✔ Added CONTEXTUAL LUNCH ENGINE
- dinner-aware lunch suggestions
- rice-heavy vs light lunch logic

✔ NO UI STRUCTURE CHANGES
- preserved stable V1.2.4 layout
- preserved theme system
- preserved navigation flow
========================================================
-->

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

.page{display:none;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{
font-size:46px;
font-weight:bold;
position:relative;
z-index:2;
}

.subtitle{
margin-top:14px;
color:var(--sub);
line-height:1.6;
position:relative;
z-index:2;
}

.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
color:var(--text);
font-weight:bold;
flex:1;
transition:.2s;
}

button:hover{
transform:scale(1.03);
}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
font-size:17px;
}

.reset-btn{
width:100%;
margin-top:10px;
}

.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.15);
z-index:999;
}

.theme-popup{
display:none;
position:fixed;
top:80px;
right:18px;
background:var(--card);
padding:14px;
border-radius:18px;
z-index:999;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.about-link{
margin-top:70px;
color:var(--accent);
font-weight:bold;
cursor:pointer;
}

.recommendation{
background:var(--card);
border-left:6px solid var(--accent);
padding:18px;
border-radius:18px;
margin-top:18px;
}

</style>
</head>

<body>

<div class="theme-floating" onclick="toggleThemePopup()">🎨</div>

<div class="theme-popup" id="themePopup">
<button onclick="setTheme('nothing')">Nothing</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>

<!-- LANDING -->
<div class="page active" id="landingPage">

<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">
<div class="section-title">Who’s checking dinner tonight?</div>

<div class="button-group">
<button onclick="enterApp('Pranab')">Pranab</button>
<button onclick="enterApp('Koyel')">Koyel</button>
</div>
</div>

<div class="about-link" onclick="openAbout()">
Why Ki Khaabo?
</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="mainPage">

<div class="container">

<div class="card">
<div class="section-title">Mood</div>
<div class="button-group">
<button onclick="selectMood(this,'comfort')">Comfort</button>
<button onclick="selectMood(this,'healthy')">Healthy</button>
<button onclick="selectMood(this,'lazy')">Low Energy</button>
<button onclick="selectMood(this,'different')">Different</button>
</div>
</div>

<div class="card">
<div class="section-title">Cooking Effort</div>
<div class="button-group">
<button onclick="selectEnergy(this,'low')">Minimal</button>
<button onclick="selectEnergy(this,'medium')">Moderate</button>
<button onclick="selectEnergy(this,'high')">Proper Cooking</button>
</div>
</div>

<div class="card">
<div class="section-title">Meal Prep</div>
<div class="button-group">
<button onclick="togglePrep(this)">No time for prep</button>
<button onclick="togglePrep(this)">Rice ready</button>
<button onclick="togglePrep(this)">Chila batter</button>
<button onclick="togglePrep(this)">Oats possible</button>
<button onclick="togglePrep(this)">Uthappa batter</button>
</div>
</div>

<button class="primary-btn" onclick="decide()">
🍛 Tell Me What We Should Eat
</button>

<button class="reset-btn" onclick="reset()">Reset</button>

<div id="result"></div>

</div>
</div>

<script>

let state={mood:"",effort:"",prep:[]};

/* HAPTICS */
function haptic(type){
if(!navigator.vibrate) return;
if(type==="light") navigator.vibrate(15);
if(type==="medium") navigator.vibrate(30);
if(type==="heavy") navigator.vibrate([60,30,120]);
}

/* SELECT */
function selectMood(el,val){
document.querySelectorAll('[onclick*="selectMood"]').forEach(x=>x.classList.remove("selected"));
el.classList.add("selected");
state.mood=val;
haptic("light");
}

function selectEnergy(el,val){
document.querySelectorAll('[onclick*="selectEnergy"]').forEach(x=>x.classList.remove("selected"));
el.classList.add("selected");
state.effort=val;
haptic("light");
}

/* PREP */
function togglePrep(el){

let val=el.innerText;

if(val==="No time for prep"){
state.prep=["No time for prep"];
document.querySelectorAll('[onclick*="togglePrep"]').forEach(x=>x.classList.remove("selected"));
el.classList.add("selected");
haptic("medium");
return;
}

if(state.prep.includes("No time for prep")){
state.prep=[];
document.querySelectorAll('[onclick*="togglePrep"]').forEach(x=>x.classList.remove("selected"));
}

el.classList.toggle("selected");

state.prep=[...document.querySelectorAll(".selected")].map(x=>x.innerText);

haptic("light");
}

/* INTELLIGENCE LAYER */
function decide(){

haptic("heavy");

let meals=[
"Egg Fried Rice",
"Pav Bhaji",
"Butter Garlic Rice + Spinach Cheese",
"Aloo Paratha",
"Spinach Corn Sandwich",
"Potato Cucumber Sandwich",
"Veg Maggi"
];

if(state.prep.includes("No time for prep")){
meals=["Veg Maggi","Simple Khichdi","Curd Rice"];
}

let pick=meals.sort(()=>0.5-Math.random()).slice(0,3);

let breakfast="Mango Oats Smoothie / Omelette / Coffee Toast";
let lunch="Light Rice Bowl / Sandwich Lunch / Leftover Fusion";

let html="";

pick.forEach((m,i)=>{
html+=`
<div class="recommendation">
<b>${["🥇","🥈","🥉"][i]} ${m}</b>
</div>
`;
});

html+=`
<div class="card">🍳 Breakfast: ${breakfast}</div>
<div class="card">🍱 Lunch: ${lunch}</div>
`;

document.getElementById("result").innerHTML=html;

}

/* RESET */
function reset(){
state={mood:"",effort:"",prep:[]};
document.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
document.getElementById("result").innerHTML="";
}

</script>

</body>
</html>
