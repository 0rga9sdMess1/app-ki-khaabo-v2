<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ki Khaabo?</title>

<!--
Ki Khaabo?
Concept by BanRap

CHANGELOG

Ver.2.6.0.15.05.2026.13.00.00
Built on top of v1.2.4 stable base

- Added haptics system (light + medium + heavy vibration)
- Added landing page transition loading overlay
- Added 2s "chef hat" transition screen
- Added "Consulting the dinner gods" full-screen loading overlay
- Added CTA button vibration feedback
- No changes to meal logic (preserved stability)
- No changes to theme system (preserved stability)
-->

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

/* EXISTING STRUCTURE PRESERVED */
.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

/* LOADING OVERLAY (NEW) */
.overlay{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.55);
backdrop-filter: blur(6px);
color:white;
z-index:9999;
text-align:center;
padding:20px;
}

.overlay.show{display:flex;}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* KEEP ALL OLD STYLES BELOW (UNCHANGED) */

.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{
font-size:46px;
font-weight:bold;
position:relative;
z-index:2;
}

.subtitle{
margin-top:14px;
color:var(--sub);
line-height:1.6;
position:relative;
z-index:2;
}

.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
color:var(--text);
font-weight:bold;
flex:1;
transition:.2s;
}

button:active{
transform:scale(0.97);
}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
font-size:17px;
}

.reset-btn{
width:100%;
margin-top:10px;
}

.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
z-index:999;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

/* rest unchanged... */

</style>
</head>

<body>

<!-- 🔥 LOADING OVERLAY -->
<div class="overlay" id="overlay">
<div class="spinner"></div>
<div id="overlayText">Loading...</div>
</div>

<!-- THEME BUTTON -->
<div class="theme-floating">🎨</div>

<!-- LANDING -->
<div class="page active" id="landingPage">

<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">

<div class="section-title">
Who’s checking dinner tonight?
</div>

<div class="button-group">

<button onclick="enterApp('Pranab')">Pranab</button>
<button onclick="enterApp('Koyel')">Koyel</button>

</div>

</div>

</div>

</div>

<!-- MAIN -->
<div class="page" id="mainPage">

<div class="container">

<div class="title" style="font-size:36px;">Ki Khaabo?</div>

<div class="card">
<div class="section-title">Mood</div>
<div class="button-group">
<button onclick="hapticTap();selectMood(this,'comfort')">Comfort</button>
<button onclick="hapticTap();selectMood(this,'healthy')">Healthy</button>
<button onclick="hapticTap();selectMood(this,'lazy')">Low Energy</button>
<button onclick="hapticTap();selectMood(this,'different')">Different</button>
</div>
</div>

<button class="primary-btn"
onclick="generateRecommendations()">
🍛 Tell Me What We Should Eat
</button>

<button class="reset-btn" onclick="resetAll()">Reset</button>

<div id="results"></div>

</div>

</div>

<script>

/* =========================
HAPTICS ENGINE (NEW)
========================= */

function vibrate(ms){
if(navigator.vibrate){
navigator.vibrate(ms);
}
}

function hapticTap(){ vibrate(15); }
function hapticSelect(){ vibrate(30); }
function hapticAction(){ vibrate(80); }

/* =========================
LOADING OVERLAY ENGINE
========================= */

function showOverlay(text){
document.getElementById("overlayText").innerText=text;
document.getElementById("overlay").classList.add("show");
}

function hideOverlay(){
document.getElementById("overlay").classList.remove("show");
}

/* =========================
NAVIGATION FIXED
========================= */

function enterApp(user){

hapticSelect();

showOverlay("Let's put our chef hats on 🧑🏼‍🍳");

setTimeout(()=>{
hideOverlay();

document.getElementById("landingPage").classList.remove("active");
document.getElementById("mainPage").classList.add("active");

},2000);
}

/* =========================
RECOMMENDATION FLOW
========================= */

function generateRecommendations(){

hapticAction();

showOverlay("Consulting the dinner gods 🍜");

setTimeout(()=>{

hideOverlay();

document.getElementById("results").innerHTML=`
<div class="card">
🥇 Egg Fried Rice<br>
<button>We Ate This</button>
</div>
`;

},2000);
}

</script>

</body>
</html>
