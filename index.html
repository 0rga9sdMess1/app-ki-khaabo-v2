<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Khaabo?</title>

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
}

.page{
display:none;
min-height:100vh;
}

.active{
display:block;
}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:260px;
height:260px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{
font-size:46px;
font-weight:bold;
}

.subtitle{
margin-top:14px;
color:var(--sub);
line-height:1.6;
}

.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-weight:bold;
margin-bottom:12px;
}

.choice-row{
display:flex;
gap:10px;
}

.choice-row button{
flex:1;
}

.button-group{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.button-group button{
flex:1 1 45%;
}

button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
color:var(--text);
font-weight:bold;
transition:.2s;
}

button:hover{
transform:scale(1.03);
}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
font-size:16px;
}

.reset-btn{
width:100%;
margin-top:12px;
background:var(--button);
color:var(--text);
}

.ate-btn{
width:100%;
margin-top:14px;
background:var(--accent);
color:#fff;
}

.top-bar{
display:flex;
align-items:center;
margin-bottom:26px;
}

.back-btn{
padding:10px 16px;
}

.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.theme-popup{
display:none;
position:fixed;
top:80px;
right:18px;
background:var(--card);
padding:14px;
border-radius:18px;
z-index:999;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.theme-popup button{
width:100%;
margin-top:8px;
}

.overlay{
position:fixed;
inset:0;
background:rgba(255,255,255,.75);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
gap:18px;
}

.overlay-text{
color:#111;
font-weight:bold;
font-size:18px;
}

.hidden{
display:none;
}

.spinner{
width:50px;
height:50px;
border:4px solid #ddd;
border-top:4px solid var(--accent);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:10000;
}

.modal-content{
background:var(--card);
padding:22px;
border-radius:20px;
width:85%;
max-width:400px;
text-align:center;
}

.modal-buttons{
display:flex;
gap:12px;
margin-top:18px;
}

.modal-buttons button{
flex:1;
}

.recommendation{
background:var(--card);
border-left:6px solid var(--accent);
padding:18px;
border-radius:18px;
margin-top:18px;
}

.meal-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.history-item{
background:rgba(0,0,0,.05);
padding:12px;
border-radius:14px;
margin-top:10px;
}

.about-link{
margin-top:40px;
color:var(--accent);
font-weight:bold;
cursor:pointer;
}

.about-toast{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:85%;
max-width:420px;
background:rgba(255,255,255,.92);
backdrop-filter:blur(10px);
padding:18px;
border-radius:18px;
z-index:9999;
line-height:1.6;
color:#111;
}

.footer-left,
.footer-right{
position:fixed;
bottom:10px;
font-size:11px;
opacity:.7;
}

.footer-left{left:12px;}
.footer-right{right:12px;}

</style>
</head>

<body>

<div class="theme-floating" onclick="toggleTheme()">🎨</div>

<div class="theme-popup" id="themePopup">
<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>

<div id="overlay" class="overlay hidden">
<div class="spinner"></div>
<div class="overlay-text" id="overlayText"></div>
</div>

<div id="backModal" class="modal">
<div class="modal-content">

<h3>Go back without deciding?</h3>

<div class="modal-buttons">
<button onclick="stay()">Stay & Decide</button>
<button onclick="goBack()">Go Back</button>
</div>

</div>
</div>

<!-- LANDING -->

<div class="page active" id="landing">

<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">

<div class="section-title">
Who’s checking dinner tonight?
</div>

<div class="choice-row">
<button onclick="enterApp()">Pranab</button>
<button onclick="enterApp()">Koyel</button>
</div>

</div>

<div class="about-link" onclick="openAbout()">
Why Ki Khaabo?
</div>

</div>
</div>

<!-- MAIN -->

<div class="page" id="main">

<div class="container">

<div class="top-bar">
<button class="back-btn" onclick="backPress()">← Back</button>
</div>

<div class="title" style="font-size:36px;">
Ki Khaabo?
</div>

<div class="card">

<div class="section-title">Mood</div>

<div class="button-group">
<button onclick="selectOption(this)">Comfort</button>
<button onclick="selectOption(this)">Healthy</button>
<button onclick="selectOption(this)">Low Energy</button>
<button onclick="selectOption(this)">Different</button>
</div>

</div>

<div class="card">

<div class="section-title">Cooking Effort</div>

<div class="button-group">
<button onclick="selectOption(this)">Minimal</button>
<button onclick="selectOption(this)">Moderate</button>
<button onclick="selectOption(this)">Proper Cooking</button>
</div>

</div>

<div class="card">

<div class="section-title">Meal Prep</div>

<div class="button-group">
<button onclick="selectOption(this)">Prep Done</button>
<button onclick="selectOption(this)">Can't Prep</button>
</div>

</div>

<div class="card">

<div class="section-title">Tomorrow Lunch?</div>

<div class="button-group">
<button onclick="selectOption(this)">Yes</button>
<button onclick="selectOption(this)">No</button>
</div>

</div>

<button class="primary-btn" onclick="generateMeals()">
🍛 Tell Me What We Should Eat
</button>

<button class="reset-btn" onclick="resetState()">
Reset Choices
</button>

<div id="results"></div>

<div class="card">

<div class="section-title">
Recent Meals
</div>

<div id="history">
No meals recorded yet.
</div>

</div>

</div>
</div>

<div class="footer-left">
Concept by BanRap
</div>

<div class="footer-right">
v1.2.9.4
</div>

<script>

const meals=[
"Egg Fried Rice",
"Moong Dal Chila",
"Bhindi Sabzi",
"Paneer Gravy",
"Egg Curry",
"Veg Pasta",
"Maggi",
"Dal Khichdi",
"Butter Garlic Fried Rice"
];

function vibrate(pattern){

if(navigator.vibrate){

navigator.vibrate(pattern);

}

}

/* THEME */

function toggleTheme(){

const popup=document.getElementById("themePopup");

popup.style.display=
popup.style.display==="block"
?"none"
:"block";

}

function applyTheme(theme){

const root=document.documentElement;

if(theme==="dark"){

root.style.setProperty("--bg","#181818");
root.style.setProperty("--card","#242424");
root.style.setProperty("--text","#dddddd");
root.style.setProperty("--sub","#aaaaaa");
root.style.setProperty("--button","#333333");
root.style.setProperty("--accent","#d4a017");

document.querySelectorAll("button")
.forEach(btn=>{
btn.style.color="#dddddd";
});

}

else if(theme==="warm"){

root.style.setProperty("--bg","#fff6ea");
root.style.setProperty("--card","#ffffff");
root.style.setProperty("--text","#5a3a1d");
root.style.setProperty("--sub","#7a5a45");
root.style.setProperty("--button","#f2d7b0");
root.style.setProperty("--accent","#ff8a00");

}

else if(theme==="sage"){

root.style.setProperty("--bg","#eef5ef");
root.style.setProperty("--card","#ffffff");
root.style.setProperty("--text","#233325");
root.style.setProperty("--sub","#607060");
root.style.setProperty("--button","#d9e7da");
root.style.setProperty("--accent","#5c8d5c");

}

else{

root.style.setProperty("--bg","#f5f5f5");
root.style.setProperty("--card","#ffffff");
root.style.setProperty("--text","#111111");
root.style.setProperty("--sub","#666666");
root.style.setProperty("--button","#dddddd");
root.style.setProperty("--accent","#ff5b35");

}

}

function setTheme(theme){

localStorage.setItem("theme",theme);

applyTheme(theme);

}

window.onload=()=>{

const saved=
localStorage.getItem("theme") || "light";

applyTheme(saved);

renderHistory();

};

/* ABOUT */

function openAbout(){

vibrate(30);

const box=document.createElement("div");

box.className="about-toast";

box.innerHTML=`
<b>Why Ki Khaabo?</b><br><br>
Because “What should we eat tonight?”
is somehow the hardest question after office hours.
This app exists to reduce emotional food negotiations 🍲
`;

document.body.appendChild(box);

function close(e){

if(!box.contains(e.target)){

box.remove();

document.removeEventListener("click",close);

}

}

setTimeout(()=>{

document.addEventListener("click",close);

},100);

}

/* ENTER */

function enterApp(){

vibrate(50);

document.getElementById("overlay")
.classList.remove("hidden");

document.getElementById("overlayText")
.innerText="Get ready to put your Chef's hat on 🧑🏼‍🍳";

setTimeout(()=>{

document.getElementById("landing")
.classList.remove("active");

document.getElementById("main")
.classList.add("active");

document.getElementById("overlay")
.classList.add("hidden");

},2000);

}

/* BACK */

function backPress(){

vibrate([20,40,20]);

document.getElementById("backModal")
.style.display="flex";

}

function stay(){

document.getElementById("backModal")
.style.display="none";

}

function goBack(){

document.getElementById("backModal")
.style.display="none";

resetState();

document.getElementById("main")
.classList.remove("active");

document.getElementById("landing")
.classList.add("active");

}

/* RESET */

function resetState(){

document.querySelectorAll(".selected")
.forEach(x=>x.classList.remove("selected"));

document.getElementById("results")
.innerHTML="";

}

/* SELECT */

function selectOption(btn){

vibrate(15);

const group=
btn.parentElement.querySelectorAll("button");

group.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

}

/* GENERATE */

function generateMeals(){

vibrate([200,100,200]);

document.getElementById("overlay")
.classList.remove("hidden");

document.getElementById("overlayText")
.innerText="🍛 Checking with the dinner gods";

setTimeout(()=>{

document.getElementById("overlay")
.classList.add("hidden");

const picks=
[...meals]
.sort(()=>0.5-Math.random())
.slice(0,3);

let html="";

picks.forEach((m,i)=>{

html+=`

<div class="recommendation">

<div class="meal-title">
${["🥇","🥈","🥉"][i]} ${m}
</div>

<div>
A strong match for tonight's mood and logistics.
</div>

<button class="ate-btn"
onclick="saveMeal('${m}')">

We Ate This

</button>

</div>

`;

});

document.getElementById("results")
.innerHTML=html;

},2000);

}

/* SAVE MEAL */

function saveMeal(meal){

let history=
JSON.parse(
localStorage.getItem("mealHistory") || "[]"
);

let today=
new Date().toDateString();

let existing=
history.find(x=>x.day===today);

if(existing){

if(existing.name===meal){

alert("Already recorded today 🍲");

return;

}

if(
!confirm(
`Replace "${existing.name}" with "${meal}"?`
)
)return;

history=
history.filter(x=>x.day!==today);

}

history.unshift({

name:meal,
day:today,
date:new Date().toLocaleString()

});

history=history.slice(0,5);

localStorage.setItem(
"mealHistory",
JSON.stringify(history)
);

renderHistory();

alert(meal+" saved 🍲");

}

/* RENDER HISTORY */

function renderHistory(){

let history=
JSON.parse(
localStorage.getItem("mealHistory") || "[]"
);

let html=
history.length ?

history.map(h=>`

<div class="history-item">

<strong>${h.name}</strong><br>

<small>${h.date}</small>

</div>

`).join("")

:

"No meals recorded yet.";

document.getElementById("history")
.innerHTML=html;

}

</script>

</body>
</html>
