<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Khaabo?</title>

<!--

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* PAGES */
.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

/* LANDING */
.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:260px;
height:260px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:0.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{
font-size:46px;
font-weight:bold;
}

.subtitle{
margin-top:14px;
color:var(--sub);
line-height:1.6;
}

/* CARD */
.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-top:20px;
}

/* BUTTONS */
button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
font-weight:bold;
width:100%;
margin-top:8px;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.selected{
background:var(--accent)!important;
color:white!important;
}

.primary-btn{
background:var(--accent);
color:white;
margin-top:20px;
font-size:16px;
}

/* TOP BAR */
.top-bar{
display:flex;
align-items:center;
margin-bottom:26px;
}

.back-btn{
padding:10px 16px;
width:auto;
}

/* THEME */
.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
}

.theme-popup{
display:none;
position:fixed;
top:80px;
right:18px;
background:var(--card);
padding:14px;
border-radius:18px;
z-index:999;
}

.theme-popup button{
width:100%;
margin-top:8px;
}

/* QUESTIONNAIRE */
.section-title{
font-weight:bold;
margin:10px 0;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.hidden{display:none;}

.loader-card{
text-align:center;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.75);
}

.spinner{
width:45px;
height:45px;
border:4px solid #ddd;
border-top:4px solid var(--accent);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* ABOUT */
.about-toast{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:85%;
max-width:420px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:16px;
border-radius:18px;
z-index:9999;
}

/* FOOTER */
.footer-left,
.footer-right{
position:fixed;
bottom:10px;
font-size:11px;
opacity:0.7;
}

.footer-left{left:12px;}
.footer-right{right:12px;}

/* BACK MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:10000;
}

.modal-content{
background:white;
padding:20px;
border-radius:18px;
width:85%;
max-width:400px;
text-align:center;
}

.modal-buttons{
display:flex;
gap:12px;
margin-top:15px;
}

.modal-buttons button{
flex:1;
}

</style>
</head>

<body>

<!-- THEME -->
<div class="theme-floating" onclick="toggleTheme()">🎨</div>

<div class="theme-popup" id="themePopup">
<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden">
<div class="loader-card">
<div class="spinner"></div>
<div id="overlayText"></div>
</div>
</div>

<!-- BACK MODAL -->
<div id="backModal" class="modal">
<div class="modal-content">
<h3>Go back without deciding?</h3>
<p>Dinner is still pending 🍲</p>

<div class="modal-buttons">
<button onclick="stay()">Stay & Decide</button>
<button onclick="goBack()">Go Back</button>
</div>
</div>
</div>

<!-- LANDING -->
<div class="page active" id="landing">

<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">

<div class="section-title">Who’s checking dinner tonight?</div>

<button onclick="enter('Pranab')">Pranab</button>
<button onclick="enter('Koyel')">Koyel</button>

</div>

<div style="margin-top:40px;color:var(--accent);font-weight:bold;cursor:pointer;"
onclick="openAbout()">
Why Ki Khaabo?
</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="main">

<div class="container">

<div class="top-bar">
<button class="back-btn" onclick="backPress()">← Back</button>
</div>

<div class="title">Ki Khaabo?</div>

<div class="card">
<div class="section-title">Mood</div>
<button onclick="select(this)">Comfort</button>
<button onclick="select(this)">Healthy</button>
<button onclick="select(this)">Low Energy</button>
<button onclick="select(this)">Different</button>
</div>

<div class="card">
<div class="section-title">Cooking Effort</div>
<button onclick="select(this)">Minimal</button>
<button onclick="select(this)">Moderate</button>
<button onclick="select(this)">Proper</button>
</div>

<div class="card">
<div class="section-title">Meal Prep</div>
<button onclick="select(this)">Done</button>
<button onclick="select(this)">Can't Prep</button>
</div>

<div class="card">
<div class="section-title">Tomorrow Lunch</div>
<button onclick="select(this)">Yes</button>
<button onclick="select(this)">No</button>
</div>

<button class="primary-btn" onclick="generate()">
🍛 Tell Me What We Should Eat
</button>

</div>
</div>

<!-- FOOTER -->
<div class="footer-left">Concept by BanRap</div>
<div class="footer-right">v1.2.9.1.15.05.2026.21.30.00</div>

<script>

function vibrate(pattern){
if(navigator.vibrate) navigator.vibrate(pattern);
}

/* THEME */
function toggleTheme(){
let p=document.getElementById("themePopup");
p.style.display=p.style.display==="block"?"none":"block";
}

function setTheme(t){
localStorage.setItem("theme",t);
}

/* ABOUT */
function openAbout(){
vibrate(30);

let box=document.createElement("div");
box.className="about-toast";

box.innerHTML=`
<b>Why Ki Khaabo?</b><br><br>
Because deciding dinner at 8 PM is harder than work.<br>
This app exists to reduce emotional food negotiations.
`;

document.body.appendChild(box);

function close(e){
if(!box.contains(e.target)){
box.remove();
document.removeEventListener("click",close);
}
}

setTimeout(()=>document.addEventListener("click",close),100);
setTimeout(()=>box.remove(),6000);
}

/* NAV */
function enter(user){
vibrate(50);

document.getElementById("overlay").classList.remove("hidden");
document.getElementById("overlayText").innerText="Get ready 🧑‍🍳";

setTimeout(()=>{
document.getElementById("landing").classList.remove("active");
document.getElementById("main").classList.add("active");
document.getElementById("overlay").classList.add("hidden");
},2000);
}

/* BACK */
function backPress(){
vibrate([20,40,20]);
document.getElementById("backModal").style.display="flex";
}

function stay(){
vibrate(20);
document.getElementById("backModal").style.display="none";
}

function goBack(){
vibrate(80);
document.getElementById("main").classList.remove("active");
document.getElementById("landing").classList.add("active");
}

/* SELECT */
function select(btn){
vibrate(10);
btn.classList.toggle("selected");
}

/* GENERATE */
function generate(){
vibrate([200,100,200]);

document.getElementById("overlay").classList.remove("hidden");
document.getElementById("overlayText").innerText="🍛 Checking with dinner gods";

setTimeout(()=>{
document.getElementById("overlay").classList.add("hidden");
},2000);
}

</script>

</body>
</html>
