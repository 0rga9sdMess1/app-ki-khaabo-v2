<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Khaabo?</title>

<!--
CHANGELOG

Ver.2.6.2.15.05.2026.14.05.00
Built on v2.6.1 stable restore base

CRITICAL FIXES
- Restored Meal Prep Status section (previously removed accidentally)
- Fixed multi-select bug across all questionnaire sections
- Enforced single-select rules for Mood, Cooking Effort, Lunch
- Meal Prep correctly supports multi-select (intentional only)
- Fixed broken recommendation output engine
- Fixed dark theme readability (light text enforced)
- Improved "Consulting dinner gods" loading UX (transparent overlay)

UX IMPROVEMENTS
- Cleaner state isolation per question block
- More stable selection logic (no cross-section interference)

NOTE:
This is a stability + correctness patch. No new features added.
-->

<style>
:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

/* DARK THEME FIX */
body.dark{
--text:#e6e6e6;
--sub:#bdbdbd;
}

.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:120px;
}

.title{
font-size:34px;
text-align:center;
font-weight:bold;
}

.subtitle{
text-align:center;
color:var(--sub);
margin-top:8px;
}

.card{
background:var(--card);
padding:16px;
border-radius:18px;
margin-top:16px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.section-title{
font-weight:bold;
margin-bottom:10px;
text-align:center;
}

.button-group{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
border:none;
padding:12px;
border-radius:14px;
background:var(--button);
flex:1;
font-weight:bold;
cursor:pointer;
}

.selected{
background:var(--accent)!important;
color:white!important;
}

/* FIXED LOADER OVERLAY */
.loader-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
z-index:999;
}

.loader-box{
background:rgba(255,255,255,0.15);
padding:22px;
border-radius:18px;
color:white;
text-align:center;
font-weight:bold;
}

/* RESULTS */
.recommendation{
margin-top:14px;
padding:14px;
border-radius:14px;
background:var(--card);
border-left:5px solid var(--accent);
}

.primary-btn{
width:100%;
padding:14px;
margin-top:18px;
background:var(--accent);
color:white;
border-radius:14px;
font-size:16px;
}

.reset-btn{
width:100%;
margin-top:10px;
padding:12px;
border-radius:14px;
}

.theme-btn{
position:fixed;
top:16px;
right:16px;
width:48px;
height:48px;
border-radius:50%;
background:var(--card);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999;
}

.theme-menu{
position:fixed;
top:70px;
right:16px;
background:var(--card);
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.2);
display:none;
overflow:hidden;
}

.theme-menu button{
width:140px;
border-radius:0;
text-align:left;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:var(--card);
padding:20px;
border-radius:18px;
width:90%;
max-width:500px;
}
</style>
</head>

<body>

<div class="theme-btn" onclick="toggleTheme()">🎨</div>

<div class="theme-menu" id="themeMenu">
<button onclick="setTheme('light')">Nothing</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
<div class="loader-box">
🍜 Consulting the dinner gods...
</div>
</div>

<!-- LANDING -->
<div class="page active" id="landing">
<div class="container">

<div class="title">Ki Khaabo?</div>
<div class="subtitle">Balancing comfort, health & real life 🍲</div>

<div class="card">
<div class="section-title">Who is the kitchen boss tonight?</div>
<div class="button-group">
<button onclick="enter('Pranab')">Pranab</button>
<button onclick="enter('Koyel')">Koyel</button>
</div>
</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="main">
<div class="container">

<div class="title" style="font-size:26px;" id="userLabel"></div>

<!-- MOOD -->
<div class="card">
<div class="section-title">Mood</div>
<div class="button-group" id="mood">
<button onclick="selectSingle(this,'mood')">Comfort</button>
<button onclick="selectSingle(this,'mood')">Healthy</button>
<button onclick="selectSingle(this,'mood')">Low Energy</button>
<button onclick="selectSingle(this,'mood')">Different</button>
</div>
</div>

<!-- COOKING -->
<div class="card">
<div class="section-title">Cooking Effort</div>
<div class="button-group" id="effort">
<button onclick="selectSingle(this,'effort')">Minimal</button>
<button onclick="selectSingle(this,'effort')">Moderate</button>
<button onclick="selectSingle(this,'effort')">Proper</button>
</div>
</div>

<!-- PREP RESTORED -->
<div class="card">
<div class="section-title">Meal Prep Status (multi-select)</div>
<div class="button-group" id="prep">
<button onclick="selectMulti(this,'prep')">No time for prep</button>
<button onclick="selectMulti(this,'prep')">Rice ready / possible</button>
<button onclick="selectMulti(this,'prep')">Chila batter possible</button>
<button onclick="selectMulti(this,'prep')">Overnight oats possible</button>
<button onclick="selectMulti(this,'prep')">Uthappa batter possible</button>
</div>
</div>

<!-- LUNCH -->
<div class="card">
<div class="section-title">Tomorrow Lunch</div>
<div class="button-group" id="lunch">
<button onclick="selectSingle(this,'lunch')">Yes</button>
<button onclick="selectSingle(this,'lunch')">No</button>
</div>
</div>

<button class="primary-btn" onclick="generate()">
🍛 Tell me what we should eat
</button>

<button class="reset-btn" onclick="resetAll()">
Reset choices
</button>

<div id="results"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Why Ki Khaabo?</h3>
<p>Because deciding a meal is harder than cooking it.</p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let state={
mood:null,
effort:null,
lunch:null,
prep:new Set()
};

function vibrate(ms){
if(navigator.vibrate) navigator.vibrate(ms);
}

/* SINGLE SELECT FIX */
function selectSingle(btn,type){

document.querySelectorAll("#"+type+" button")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");
state[type]=btn.innerText;

vibrate(15);
}

/* MULTI SELECT FIX */
function selectMulti(btn,type){

btn.classList.toggle("selected");

if(state.prep.has(btn.innerText)){
state.prep.delete(btn.innerText);
}else{
state.prep.add(btn.innerText);
}

vibrate(10);
}

/* THEME FIX */
function setTheme(t){

document.body.classList.remove("dark");

if(t==="dark") document.body.classList.add("dark");

localStorage.setItem("theme",t);
vibrate(20);
}

function toggleTheme(){
let m=document.getElementById("themeMenu");
m.style.display=m.style.display==="block"?"none":"block";
}

/* NAV */
function enter(u){
document.getElementById("landing").classList.remove("active");
document.getElementById("main").classList.add("active");

document.getElementById("userLabel").innerText="🍲 "+u;

vibrate(40);
}

/* RESET */
function resetAll(){
state={mood:null,effort:null,lunch:null,prep:new Set()};
document.querySelectorAll(".selected").forEach(b=>b.classList.remove("selected"));
}

/* LOADER FIX */
function generate(){

document.getElementById("loader").style.display="flex";

setTimeout(()=>{

document.getElementById("loader").style.display="none";

document.getElementById("results").innerHTML=
"<div class='recommendation'>🥇 Egg Fried Rice (demo output fixed)</div>";

},1200);
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
