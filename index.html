<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ki Khaabo?</title>

<!--
Ki Khaabo?
Concept by BanRap

Ver.1.2.6.15.05.2026.18.04.00

UI RESTORE + MICRO UX POLISH
-->

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

/* PAGES */
.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

/* LANDING */
.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{font-size:46px;font-weight:bold;}
.subtitle{margin-top:14px;color:var(--sub);line-height:1.6;}

.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.button-group{display:flex;gap:10px;flex-wrap:wrap;}

button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
color:var(--text);
font-weight:bold;
flex:1;
transition:.2s;
}

button:hover{transform:scale(1.03);}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
font-size:17px;
}

.reset-btn{width:100%;margin-top:10px;}

/* TOP BAR */
.top-bar{
position:relative;
display:flex;
align-items:center;
justify-content:flex-start;
margin-bottom:26px;
min-height:52px;
}

.back-btn{padding:10px 18px;flex:none;}

.user-badge{
position:absolute;
left:50%;
transform:translateX(-50%);
background:var(--card);
padding:12px 20px;
border-radius:18px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* RESULTS */
.recommendation{
background:var(--card);
border-left:6px solid var(--accent);
padding:18px;
border-radius:18px;
margin-top:18px;
}

.meal-title{font-size:22px;font-weight:bold;margin-bottom:12px;}
.reason{color:var(--sub);}

.ate-btn{
background:var(--accent);
color:#fff;
margin-top:14px;
width:100%;
}

.history-item{
background:rgba(0,0,0,.04);
padding:12px;
border-radius:14px;
margin-top:10px;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(255,255,255,0.75);
backdrop-filter: blur(10px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

.hidden{display:none;}

.loader-card{
text-align:center;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.6);
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.spinner{
width:45px;
height:45px;
border:4px solid #ddd;
border-top:4px solid var(--accent);
border-radius:50%;
margin:0 auto 15px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* FOOTERS */
.footer-left,
.footer-right{
position:fixed;
bottom:10px;
font-size:11px;
opacity:.7;
}

.footer-left{left:12px;}
.footer-right{right:12px;}

/* THEME SWITCHER */
.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.15);
z-index:999;
}

.theme-popup{
display:none;
position:fixed;
top:80px;
right:18px;
background:var(--card);
padding:14px;
border-radius:18px;
z-index:999;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.theme-popup button{
width:100%;
margin-top:8px;
}

.about-link{
margin-top:30px;
color:var(--accent);
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlayLoader" class="overlay hidden">
  <div class="loader-card">
    <div class="spinner"></div>
    <div id="overlayText"></div>
  </div>
</div>

<!-- THEME -->
<div class="theme-floating" onclick="toggleThemePopup()">🎨</div>

<div class="theme-popup" id="themePopup">
<button onclick="setTheme('nothing')">Nothing</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>

<!-- LANDING -->
<div class="page active" id="landingPage">

<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">

<div class="section-title">Who’s checking dinner tonight?</div>

<div class="button-group">
<button onclick="enterApp('Pranab')">Pranab</button>
<button onclick="enterApp('Koyel')">Koyel</button>
</div>

</div>

<div class="about-link" onclick="openAbout()">
Why Ki Khaabo?
</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="mainPage">

<div class="container">

<div class="top-bar">
<button class="back-btn" onclick="goBack()">← Back</button>
<div class="user-badge" id="activeUser">🍲 Tonight</div>
</div>

<div class="title" style="font-size:36px;">Ki Khaabo?</div>

<!-- INPUTS -->
<div class="card">
<div class="section-title">Mood</div>
<div class="button-group" id="moodButtons">

<button onclick="selectMood(this,'comfort')">Comfort</button>
<button onclick="selectMood(this,'healthy')">Healthy</button>
<button onclick="selectMood(this,'lazy')">Low Energy</button>
<button onclick="selectMood(this,'different')">Different</button>

</div>
</div>

<div class="card">
<div class="section-title">Cooking effort</div>
<div class="button-group" id="energyButtons">

<button onclick="selectEnergy(this,'low')">Minimal</button>
<button onclick="selectEnergy(this,'medium')">Moderate</button>
<button onclick="selectEnergy(this,'high')">Proper Cooking</button>

</div>
</div>

<div class="card">
<div class="section-title">Meal prep status</div>
<div class="button-group" id="prepButtons">

<button onclick="selectPrep(this,'done')">Meal prep done</button>
<button onclick="selectPrep(this,'cant')">Didn't / can't prep</button>

</div>
</div>

<div class="card">
<div class="section-title">Tomorrow lunch?</div>
<div class="button-group" id="lunchButtons">

<button onclick="selectLunch(this,true)">Yes</button>
<button onclick="selectLunch(this,false)">No</button>

</div>
</div>

<button class="primary-btn" onclick="generateRecommendations()">
🍛 Tell Me What We Should Eat
</button>

<div id="results"></div>

</div>
</div>

<!-- FOOTERS -->
<div class="footer-left">Concept by BanRap</div>
<div class="footer-right">Ver.1.2.6.15.05.2026.18.04.00</div>

<script>

let selectedUser="",selectedMood="",selectedEnergy="",prepStatus="",lunchNeeded=false;

/* ===== HAPTICS ===== */
function vibrate(p){
try{if(navigator.vibrate) navigator.vibrate(p);}catch(e){}
}

/* ===== OVERLAY ===== */
function showOverlay(text,time){
document.getElementById("overlayText").innerText=text;
document.getElementById("overlayLoader").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("overlayLoader").classList.add("hidden");
},time);
}

/* ===== THEME ===== */
function toggleThemePopup(){
let p=document.getElementById("themePopup");
p.style.display = p.style.display==="block"?"none":"block";
}

/* ===== ENTER ===== */
function enterApp(user){

selectedUser=user;
document.getElementById("activeUser").innerHTML="🍲 "+user;

vibrate(50);
showOverlay("Get ready to put your Chef's hat on 🧑🏼‍🍳",2000);

setTimeout(()=>{
swap("landingPage","mainPage");
},2000);

}

/* ===== NAV ===== */
function swap(a,b){
document.getElementById(a).classList.remove("active");
document.getElementById(b).classList.add("active");
}

function goBack(){
resetAll();
swap("mainPage","landingPage");
}

/* ===== SELECTIONS (NOW WITH HAPTICS) ===== */
function selectMood(b,v){clear("#moodButtons");b.classList.add("selected");selectedMood=v;vibrate(30);}
function selectEnergy(b,v){clear("#energyButtons");b.classList.add("selected");selectedEnergy=v;vibrate(30);}
function selectPrep(b,v){clear("#prepButtons");b.classList.add("selected");prepStatus=v;vibrate(30);}
function selectLunch(b,v){clear("#lunchButtons");b.classList.add("selected");lunchNeeded=v;vibrate(30);}

function clear(id){
document.querySelectorAll(id+" button").forEach(x=>x.classList.remove("selected"));
}

function resetAll(){
selectedMood="";selectedEnergy="";prepStatus="";lunchNeeded=false;
document.querySelectorAll(".selected").forEach(x=>x.classList.remove("selected"));
document.getElementById("results").innerHTML="";
}

/* ===== GENERATE ===== */
function generateRecommendations(){

vibrate([200,100,200]);
showOverlay("🍛 Checking with the dinner gods",2000);

setTimeout(()=>{

let meals=[
"Egg Fried Rice","Moong Dal Chila","Pav Bhaji","Bhindi Sabzi",
"Paneer Gravy","Veg Pasta","Egg Curry","Veg Maggi","Lauki Sabzi","Palak Paneer"
];

let pick=meals.sort(()=>0.5-Math.random()).slice(0,3);

let html="";

pick.forEach((m,i)=>{
html+=`
<div class="recommendation">
<div class="meal-title">${["🥇","🥈","🥉"][i]} ${m}</div>
<div class="reason">A strong match for tonight.</div>
</div>`;
});

document.getElementById("results").innerHTML=html;

},2000);
}

</script>

</body>
</html>
