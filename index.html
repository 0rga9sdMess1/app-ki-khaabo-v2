<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ki Khaabo?</title>

<!--
Ki Khaabo?
Concept by BanRap

Ver.1.2.8.15.05.2026.19.30.00

UX POLISH + INTERACTION IMPROVEMENTS

NEW:
- Back button confirmation modal (Stay / Go Back)
- Custom back-button haptic pattern (warning style)
- Click-outside-to-close for "Why Ki Khaabo?" popup
- Improved landing page vertical spacing (visual balance fix)

IMPROVED:
- Better interaction feedback design system (soft vs warning vs action haptics)
- Better UX flow consistency across pages

UNCHANGED:
- Meal system (random v1 engine)
- Overlay loader system
- Theme system
- History system
-->

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

/* LANDING SPACING FIX */
.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:60px; /* moved slightly up */
}

.title{
font-size:46px;
font-weight:bold;
margin-top:-20px; /* moved up */
}

.subtitle{
margin-top:8px;
color:var(--sub);
line-height:1.6;
}

/* BUTTONS */
button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
font-weight:bold;
transition:.2s;
}

button:hover{transform:scale(1.03);}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
}

/* ABOUT LINK POSITION FIX */
.about-link{
margin-top:45px; /* moved slightly down */
color:var(--accent);
font-weight:bold;
cursor:pointer;
}

/* TOP BAR */
.top-bar{
display:flex;
align-items:center;
justify-content:flex-start;
margin-bottom:26px;
position:relative;
}

.back-btn{
padding:10px 18px;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(255,255,255,0.75);
backdrop-filter: blur(10px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.hidden{display:none;}

.loader-card{
background:rgba(255,255,255,0.7);
padding:25px;
border-radius:20px;
text-align:center;
}

.spinner{
width:45px;height:45px;
border:4px solid #ddd;
border-top:4px solid var(--accent);
border-radius:50%;
animation:spin 1s linear infinite;
margin:0 auto 10px;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* MODAL BACK CONFIRM */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:10000;
}

.modal-content{
background:white;
padding:20px;
border-radius:18px;
width:85%;
max-width:400px;
text-align:center;
}

.modal-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.footer-left,
.footer-right{
position:fixed;
bottom:10px;
font-size:11px;
opacity:.7;
}

.footer-left{left:12px;}
.footer-right{right:12px;}

</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlayLoader" class="overlay hidden">
<div class="loader-card">
<div class="spinner"></div>
<div id="overlayText"></div>
</div>
</div>

<!-- BACK MODAL -->
<div id="backModal" class="modal">
<div class="modal-content">
<h3>Are you sure?</h3>
<p>You haven’t decided dinner yet 🍲</p>

<div class="modal-buttons">
<button onclick="stayHere()">Stay & Decide</button>
<button onclick="goBackConfirm()">Go Back</button>
</div>
</div>
</div>

<!-- LANDING -->
<div class="page active" id="landingPage">

<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">

<button onclick="enterApp('Pranab')">Pranab</button>
<button onclick="enterApp('Koyel')">Koyel</button>

</div>

<div class="about-link" onclick="openAbout(event)">
Why Ki Khaabo?
</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="mainPage">

<div class="container">

<div class="top-bar">
<button class="back-btn" onclick="backPress()">← Back</button>
</div>

<div class="title">Ki Khaabo?</div>

<button class="primary-btn" onclick="generate()">🍛 Tell Me What To Eat</button>

</div>
</div>

<!-- FOOTERS -->
<div class="footer-left">Concept by BanRap</div>
<div class="footer-right">Ver.1.2.8.15.05.2026.19.30.00</div>

<script>

/* HAPTICS */
function vibrate(p){
if(navigator.vibrate) navigator.vibrate(p);
}

/* OVERLAY */
function showOverlay(text,time){
document.getElementById("overlayText").innerText=text;
document.getElementById("overlayLoader").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("overlayLoader").classList.add("hidden");
},time);
}

/* ENTER */
function enterApp(user){
vibrate(50);
showOverlay("Get ready 🧑‍🍳",2000);
setTimeout(()=>{
document.getElementById("landingPage").classList.remove("active");
document.getElementById("mainPage").classList.add("active");
},2000);
}

/* BACK BUTTON (NEW UX) */
function backPress(){
vibrate([30,50,30]); // warning pattern
document.getElementById("backModal").style.display="flex";
}

function stayHere(){
vibrate(20);
document.getElementById("backModal").style.display="none";
}

function goBackConfirm(){
vibrate(80);
document.getElementById("backModal").style.display="none";
document.getElementById("mainPage").classList.remove("active");
document.getElementById("landingPage").classList.add("active");
}

/* ABOUT POPUP (CLICK OUTSIDE CLOSE ENABLED) */
function openAbout(e){

let msg=document.createElement("div");
msg.id="aboutPopup";
msg.style.position="fixed";
msg.style.bottom="80px";
msg.style.left="50%";
msg.style.transform="translateX(-50%)";
msg.style.background="rgba(255,255,255,0.85)";
msg.style.padding="15px";
msg.style.borderRadius="15px";
msg.style.width="85%";
msg.style.maxWidth="420px";
msg.style.zIndex="9999";
msg.style.backdropFilter="blur(10px)";

msg.innerHTML=`
<b>Why Ki Khaabo?</b><br><br>
Because every evening ends with:<br>
“kya khana hai?” 🤯<br><br>
This app prevents food arguments and emotional hunger decisions.
`;

document.body.appendChild(msg);

/* auto close */
setTimeout(()=>msg.remove(),6000);

/* click outside closes */
setTimeout(()=>{
document.addEventListener("click", function handler(ev){
if(!msg.contains(ev.target)){
msg.remove();
document.removeEventListener("click",handler);
}
});
},100);
}

/* GENERATE */
function generate(){
vibrate([200,100,200]);
showOverlay("🍛 Checking with dinner gods",2000);
}

</script>

</body>
</html>
