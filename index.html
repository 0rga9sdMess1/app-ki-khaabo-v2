<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Khaabo?</title>

<style>
:root{
--bg:#f5f5f5;
--card:#fff;
--text:#111;
--accent:#ff5b35;
--sub:#666;
--button:#ddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* LANDING */
.page{display:none;min-height:100vh;}
.active{display:block;}

.center{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
padding:20px;
}

.title{
font-size:44px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:var(--sub);
margin-bottom:30px;
}

.card{
background:var(--card);
padding:18px;
border-radius:18px;
margin-top:16px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
width:100%;
max-width:520px;
}

button{
border:none;
padding:12px;
border-radius:14px;
cursor:pointer;
background:var(--button);
margin:5px;
transition:0.2s;
width:100%;
}

button:active{transform:scale(0.97);}
.selected{background:var(--accent);color:#fff;}

/* TOP BAR */
.topbar{
position:fixed;
top:10px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:0 12px;
align-items:center;
}

.back{
background:var(--card);
padding:8px 12px;
border-radius:16px;
cursor:pointer;
}

.user{
background:var(--card);
padding:8px 14px;
border-radius:16px;
font-weight:bold;
}

/* THEME */
.theme{
position:fixed;
top:15px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

/* LOADER */
.loader{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
display:none;
align-items:center;
justify-content:center;
color:#fff;
font-size:18px;
text-align:center;
z-index:999;
padding:20px;
}

/* WHY */
.why{
margin-top:25px;
color:var(--accent);
cursor:pointer;
}

/* FOOTER */
.footer{
position:fixed;
bottom:8px;
font-size:11px;
color:var(--sub);
}

.footer.left{left:10px;}
.footer.right{right:10px;}
</style>
</head>

<body>

<!-- THEME -->
<div class="theme" onclick="toggleTheme()">🎨</div>

<!-- TOP BAR -->
<div class="topbar" id="topbar" style="display:none;">
<div class="back" onclick="goBack()">← Back</div>
<div class="user" id="userLabel"></div>
</div>

<!-- LANDING -->
<div class="page active" id="landing">
<div class="center">

<div class="title">Ki Khaabo?</div>
<div class="subtitle">Because deciding a meal is harder than cooking it.</div>

<div class="card">
<div>Who is the kitchen boss tonight?</div>
<button onclick="enter('Pranab')">Pranab</button>
<button onclick="enter('Koyel')">Koyel</button>
</div>

<div class="why" onclick="openWhy()">Why Ki Khaabo?</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="main">
<div class="center">

<div class="card">
<div>Mood</div>
<button onclick="sel(this)">Comfort</button>
<button onclick="sel(this)">Healthy</button>
<button onclick="sel(this)">Low Energy</button>
<button onclick="sel(this)">Different / Special</button>
</div>

<div class="card">
<div>Cooking Effort</div>
<button onclick="sel(this)">Minimal</button>
<button onclick="sel(this)">Moderate</button>
<button onclick="sel(this)">Proper Cooking</button>
</div>

<div class="card">
<div>Meal Prep Status</div>
<button onclick="toggle(this)">Didn't / Can't find time</button>
<button onclick="toggle(this)">Rice ready / can be made</button>
<button onclick="toggle(this)">Chila batter possible</button>
<button onclick="toggle(this)">Overnight oats possible</button>
<button onclick="toggle(this)">Uthappa batter possible</button>
</div>

<div class="card">
<div>Tomorrow Lunch Needed?</div>
<button onclick="sel(this)">Yes</button>
<button onclick="sel(this)">No</button>
</div>

<button onclick="cook()" class="card" style="background:var(--accent);color:#fff;">
🍛 Tell me what we should eat
</button>

<button onclick="reset()">Reset Choices</button>

<div id="result"></div>

</div>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
Consulting the dinner gods 🍜
</div>

<!-- FOOTER -->
<div class="footer left">BanRap</div>
<div class="footer right">Ver.2.3.0</div>

<script>

let user="";

function enter(u){
user=u;
document.getElementById("loader").style.display="flex";

if(navigator.vibrate) navigator.vibrate(60);

setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("landing").classList.remove("active");
document.getElementById("main").classList.add("active");
document.getElementById("topbar").style.display="flex";
document.getElementById("userLabel").innerText="🍲 "+u;
},1200);
}

function goBack(){
if(confirm("Go back and leave dinner destiny to chaos?")){
location.reload();
}
}

function sel(el){
el.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
el.classList.add("selected");
if(navigator.vibrate) navigator.vibrate(20);
}

function toggle(el){
el.classList.toggle("selected");
if(navigator.vibrate) navigator.vibrate(20);
}

function cook(){
document.getElementById("loader").style.display="flex";

setTimeout(()=>{
document.getElementById("loader").style.display="none";

document.getElementById("result").innerHTML=`
<div class="card">🥇 Egg Fried Rice</div>
<div class="card">🥈 Pav Bhaji</div>
<div class="card">🥉 Aloo Paratha</div>
<div class="card">🍱 Lunch: Smart rice pairing applied</div>
<div class="card">🥣 Breakfast: placeholder intelligence active</div>
`;
},2000);
}

function reset(){
document.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
document.getElementById("result").innerHTML="";
}

function toggleTheme(){
let r=document.documentElement.style;

if(getComputedStyle(document.documentElement).getPropertyValue("--bg").trim()==="#f5f5f5"){
r.setProperty("--bg","#111");
r.setProperty("--card","#222");
r.setProperty("--text","#fff");
r.setProperty("--button","#333");
}else{
r.setProperty("--bg","#f5f5f5");
r.setProperty("--card","#fff");
r.setProperty("--text","#111");
r.setProperty("--button","#ddd");
}
}

</script>

</body>
</html>
