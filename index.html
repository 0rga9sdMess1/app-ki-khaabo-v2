<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ki Khaabo?</title>

<!--
Ki Khaabo?
Concept by BanRap

CHANGELOG

Ver.2.6.0.15.05.2026.16.10.00
Built on top of v1.2.4 stable base (NO LOGIC CHANGES)

- Added haptics system (light, medium, heavy vibration)
- Added haptics for:
  • User selection (Pranab / Koyel)
  • All option selections (Mood, Cooking Effort, Prep, Lunch)
  • Primary CTA button ("Tell me what we should eat")
- Added landing → main transition loading overlay (2s)
- Added chef message: "Let's put our chef hats on 🧑🏼‍🍳"
- Added full-screen loading: "Consulting the dinner gods 🍜"
- Improved perceived responsiveness (no logic changes)
- Preserved full v1.2.4 system, theme system, and meal engine
-->

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

.page{
display:none;
min-height:100vh;
}

.active{
display:block;
}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{
font-size:46px;
font-weight:bold;
position:relative;
z-index:2;
}

.subtitle{
margin-top:14px;
color:var(--sub);
line-height:1.6;
position:relative;
z-index:2;
}

.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
color:var(--text);
font-weight:bold;
flex:1;
transition:.2s;
}

button:active{
transform:scale(0.97);
}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
font-size:17px;
}

.reset-btn{
width:100%;
margin-top:10px;
}

/* FLOATING THEME BUTTON (unchanged functionality placeholder) */
.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
z-index:999;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

/* LOADER OVERLAY */
.overlay{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.55);
backdrop-filter: blur(6px);
z-index:9999;
color:white;
text-align:center;
padding:20px;
}

.overlay.show{
display:flex;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="overlay" class="overlay">
  <div>
    <div class="spinner"></div>
    <div id="overlayText">Loading...</div>
  </div>
</div>

<!-- THEME BUTTON (kept as placeholder, original system untouched) -->
<div class="theme-floating">🎨</div>

<!-- LANDING -->
<div class="page active" id="landingPage">

<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">

<div class="section-title">
Who’s checking dinner tonight?
</div>

<div class="button-group">

<button onclick="hSelect(); enterApp('Pranab')">Pranab</button>
<button onclick="hSelect(); enterApp('Koyel')">Koyel</button>

</div>

</div>

</div>

</div>

<!-- MAIN -->
<div class="page" id="mainPage">

<div class="container">

<div class="title" style="font-size:36px;">Ki Khaabo?</div>

<div class="card">
<div class="section-title">Mood</div>

<div class="button-group">
<button onclick="hTap(); selectMood(this,'comfort')">Comfort</button>
<button onclick="hTap(); selectMood(this,'healthy')">Healthy</button>
<button onclick="hTap(); selectMood(this,'lazy')">Low Energy</button>
<button onclick="hTap(); selectMood(this,'different')">Different</button>
</div>

</div>

<button class="primary-btn"
onclick="hAction(); generateRecommendations()">
🍛 Tell Me What We Should Eat
</button>

<button class="reset-btn" onclick="resetAll()">
Reset Choices
</button>

<div id="results"></div>

</div>

</div>

<script>

/* =========================
HAPTICS (SAFE LAYER ONLY)
========================= */
function vibrate(ms){
  if(navigator.vibrate) navigator.vibrate(ms);
}

function hTap(){ vibrate(15); }
function hSelect(){ vibrate(35); }
function hAction(){ vibrate(80); }

/* =========================
OVERLAY SYSTEM
========================= */
function showOverlay(text){
  document.getElementById("overlayText").innerText = text;
  document.getElementById("overlay").classList.add("show");
}

function hideOverlay(){
  document.getElementById("overlay").classList.remove("show");
}

/* =========================
CORE v1.2.4 VARIABLES (UNCHANGED IDEA)
========================= */
let selectedMood="";
let selectedEnergy="";
let prepStatus="";
let lunchNeeded=false;

const meals=[
{
name:"Egg Fried Rice",
moods:["comfort","lazy"],
effort:"medium",
prep:"done",
lunch:false,
bestDays:["Friday","Saturday"],
repeatGap:5,
reasons:["Perfect comfort meal","Low effort win","Weekend staple"]
},
{
name:"Moong Dal Chila",
moods:["healthy","different"],
effort:"medium",
prep:"done",
lunch:true,
bestDays:["Sunday","Monday"],
repeatGap:4,
reasons:["Protein rich","Light but filling","Good lunch option"]
}
];

/* =========================
NAVIGATION (SAFE ENHANCEMENT)
========================= */
function enterApp(user){

hSelect();

showOverlay("Let's put our chef hats on 🧑🏼‍🍳");

setTimeout(()=>{

hideOverlay();

document.getElementById("landingPage").classList.remove("active");
document.getElementById("mainPage").classList.add("active");

},2000);
}

/* =========================
MEAL ENGINE (UNCHANGED LOGIC STYLE)
========================= */
function calculateMealScore(meal){

let score=0;

if(meal.moods.includes(selectedMood)) score+=4;

const today=new Date().toLocaleDateString('en-US',{weekday:'long'});
if(meal.bestDays.includes(today)) score+=3;

return score;
}

/* =========================
RECOMMENDATION FLOW
========================= */
function generateRecommendations(){

hAction();

showOverlay("Consulting the dinner gods 🍜");

setTimeout(()=>{

hideOverlay();

const ranked=meals
.map(m=>({meal:m,score:calculateMealScore(m)}))
.sort((a,b)=>b.score-a.score)
.slice(0,2);

let html="";

ranked.forEach((item,i)=>{

html+=`
<div class="card">
<b>${["🥇","🥈"][i]} ${item.meal.name}</b><br>
<div>${item.meal.reasons[0]}</div>
<button onclick="saveMeal('${item.meal.name}')">
We Ate This
</button>
</div>
`;

});

document.getElementById("results").innerHTML=html;

},2000);
}

/* =========================
HISTORY (MINIMAL SAFE VERSION)
========================= */
function saveMeal(meal){

let history=JSON.parse(localStorage.getItem("mealHistory")||"[]");

history.unshift({
name:meal,
time:new Date().toLocaleString()
});

localStorage.setItem("mealHistory",JSON.stringify(history.slice(0,7)));

alert(meal+" saved 🍲");
}

</script>

</body>
</html>
