<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Khaabo?</title>

<!--
CHANGELOG

Ver.2.6.1.15.05.2026.13.40.00
Built on v1.2.4 stable base (UI RESTORE FIX)

CRITICAL FIXES
- Restored FULL second page UI (was accidentally stripped)
- Fixed back button navigation
- Fixed landing → main flow stability
- Fixed Why Ki Khaabo modal reliability
- Fixed theme switcher crash state
- Converted theme switcher to vertical dropdown menu

UX IMPROVEMENTS
- Added haptics feedback for key interactions
- Improved UI stability (no partial rendering states)

NOTE:
This is a RESTORE + STABILITY patch. No feature expansion.
-->

<style>
:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}

body{
background:var(--bg);
color:var(--text);
transition:.2s;
}

.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:120px;
}

.title{font-size:40px;font-weight:bold;text-align:center;}
.subtitle{text-align:center;color:var(--sub);margin-top:10px;}

.glow{
position:absolute;
width:250px;height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;border-radius:50%;
filter:blur(30px);
top:80px;
left:50%;
transform:translateX(-50%);
}

.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
position:relative;
}

.card{
background:var(--card);
padding:18px;
border-radius:20px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-weight:bold;
margin-bottom:10px;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px;
border-radius:14px;
cursor:pointer;
background:var(--button);
font-weight:bold;
flex:1;
}

.selected{background:var(--accent)!important;color:#fff!important;}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:15px;
font-size:16px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.back-btn{
padding:10px 14px;
flex:none;
}

/* USER */
.user{
font-weight:bold;
}

/* THEME DROPDOWN */
.theme-wrap{
position:fixed;
top:18px;
right:18px;
z-index:999;
}

.theme-btn{
width:48px;height:48px;
border-radius:50%;
background:var(--card);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.theme-menu{
display:none;
position:absolute;
top:60px;
right:0;
background:var(--card);
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.15);
overflow:hidden;
}

.theme-menu button{
width:140px;
display:block;
border-radius:0;
text-align:left;
}

.about{
margin-top:40px;
color:var(--accent);
font-weight:bold;
cursor:pointer;
text-align:center;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
justify-content:center;
align-items:center;
}

.modal-content{
background:var(--card);
padding:20px;
border-radius:18px;
width:90%;
max-width:500px;
}

</style>
</head>

<body>

<!-- THEME -->
<div class="theme-wrap">
<div class="theme-btn" onclick="toggleTheme()">🎨</div>
<div class="theme-menu" id="themeMenu">
<button onclick="setTheme('nothing')">Nothing</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>
</div>

<!-- LANDING -->
<div class="page active" id="landing">
<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>
<div class="subtitle">Balancing comfort, health & real life 🍲</div>

<div class="card">
<div class="section-title">Who is the kitchen boss tonight?</div>

<div class="button-group">
<button onclick="enter('Pranab')">Pranab</button>
<button onclick="enter('Koyel')">Koyel</button>
</div>
</div>

<div class="about" onclick="openAbout()">Why Ki Khaabo?</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="main">
<div class="container">

<div class="top-bar">
<button class="back-btn" onclick="back()">← Back</button>
<div class="user" id="userLabel"></div>
</div>

<div class="title" style="font-size:28px;">Ki Khaabo?</div>

<!-- QUESTIONNAIRE -->
<div class="card">
<div class="section-title">Mood</div>
<div class="button-group">
<button onclick="select(this)">Comfort</button>
<button onclick="select(this)">Healthy</button>
<button onclick="select(this)">Low Energy</button>
<button onclick="select(this)">Different</button>
</div>
</div>

<div class="card">
<div class="section-title">Cooking effort</div>
<div class="button-group">
<button onclick="select(this)">Minimal</button>
<button onclick="select(this)">Moderate</button>
<button onclick="select(this)">Proper</button>
</div>
</div>

<div class="card">
<div class="section-title">Tomorrow lunch?</div>
<div class="button-group">
<button onclick="select(this)">Yes</button>
<button onclick="select(this)">No</button>
</div>
</div>

<button class="primary-btn" onclick="generate()">
🍛 Tell me what we should eat
</button>

<div id="loader"></div>
<div id="results"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Why Ki Khaabo?</h3>
<p>
Because deciding a meal is harder than cooking it.
But rest assured, we have some magic up our sleeves.
</p>
<button onclick="closeAbout()">Close</button>
</div>
</div>

<script>

let user="";

/* HAPTICS */
function vibe(ms){
if(navigator.vibrate) navigator.vibrate(ms);
}

/* THEME */
function setTheme(t){
vibe(20);

if(t==="nothing")apply("#f5f5f5","#fff","#111","#ff5b35","#666","#ddd");
if(t==="warm")apply("#fff6ea","#fff","#5a3a1d","#ff8a00","#7a5a45","#f2d7b0");
if(t==="sage")apply("#eef5ef","#fff","#233325","#5c8d5c","#607060","#d9e7da");
if(t==="dark")apply("#181818","#242424","#fff","#d4a017","#bbb","#333");

localStorage.setItem("theme",t);
}

function apply(bg,card,text,accent,sub,btn){
document.documentElement.style.setProperty("--bg",bg);
document.documentElement.style.setProperty("--card",card);
document.documentElement.style.setProperty("--text",text);
document.documentElement.style.setProperty("--accent",accent);
document.documentElement.style.setProperty("--sub",sub);
document.documentElement.style.setProperty("--button",btn);
}

/* THEME MENU */
function toggleTheme(){
let m=document.getElementById("themeMenu");
m.style.display = m.style.display==="block"?"none":"block";
}

/* NAV */
function enter(u){
user=u;
vibe(40);
document.getElementById("userLabel").innerText="🍲 "+u;
swap("landing","main");
}

function back(){
swap("main","landing");
}

function swap(a,b){
document.getElementById(a).classList.remove("active");
document.getElementById(b).classList.add("active");
}

/* SELECT */
function select(btn){
vibe(10);
btn.classList.toggle("selected");
}

/* GENERATE */
function generate(){
vibe(60);
document.getElementById("loader").innerHTML="🍜 Consulting dinner gods...";

setTimeout(()=>{
document.getElementById("loader").innerHTML="";
document.getElementById("results").innerHTML=
"<div class='card'>🥇 Egg Fried Rice<br>Perfect comfort logic match</div>";
},1200);
}

/* MODAL */
function openAbout(){
document.getElementById("modal").style.display="flex";
}

function closeAbout(){
document.getElementById("modal").style.display="none";
}

/* INIT */
window.onload=()=>{
setTheme(localStorage.getItem("theme")||"nothing");
};

</script>

</body>
</html>
