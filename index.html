<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ki Khaabo?</title>

<!--
Ki Khaabo?
Concept by BanRap

CHANGELOG

Ver.2.6.0.15.05.2026.13.10.00

FIXES (STABILITY RESTORE)

<style>
:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{
font-size:46px;
font-weight:bold;
}

.subtitle{
margin-top:14px;
color:var(--sub);
line-height:1.6;
}

.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
color:var(--text);
font-weight:bold;
flex:1;
transition:.15s;
}

button:active{
transform:scale(0.97);
}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
font-size:17px;
}

.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.15);
z-index:999;
}

.theme-popup{
display:none;
position:fixed;
top:80px;
right:18px;
background:var(--card);
padding:14px;
border-radius:18px;
z-index:999;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.about-link{
margin-top:40px;
color:var(--accent);
font-weight:bold;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:var(--card);
padding:25px;
border-radius:22px;
width:90%;
max-width:500px;
}

</style>
</head>

<body>

<div class="theme-floating" onclick="toggleTheme()">🎨</div>

<div class="theme-popup" id="themePopup">
<button onclick="setTheme('nothing')">Nothing</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>

<!-- LANDING -->
<div class="page active" id="landingPage">
<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health, leftovers & real life 🍲
</div>

<div class="card">

<div class="section-title">
Who is the kitchen boss tonight?
</div>

<div class="button-group">

<button onclick="enterApp('Pranab')">Pranab</button>
<button onclick="enterApp('Koyel')">Koyel</button>

</div>
</div>

<div class="about-link" onclick="openAbout()">
Why Ki Khaabo?
</div>

</div>
</div>

<!-- MAIN -->
<div class="page" id="mainPage">
<div class="container">

<div class="card">
<div class="section-title" id="userTitle">🍲</div>
</div>

<button class="primary-btn" onclick="goBack()">← Back</button>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="aboutModal">
<div class="modal-content">
<h2>Why Ki Khaabo?</h2>
<p>
Because deciding a meal is harder than cooking it.
But rest assured, we have some magic up our sleeves.
</p>
<button onclick="closeAbout()">Close</button>
</div>
</div>

<script>

/* =========================
STATE SAFE INIT
========================= */

let currentUser="";
let currentTheme="nothing";

/* =========================
HAPTICS SAFE WRAPPER
========================= */

function vibrate(ms){
if(navigator.vibrate){
navigator.vibrate(ms);
}
}

/* =========================
THEME SYSTEM (FIXED)
========================= */

function setTheme(t){
currentTheme=t;

if(t==="nothing") apply("#f5f5f5","#fff","#111","#ff5b35","#666","#ddd");
if(t==="warm") apply("#fff6ea","#fff","#5a3a1d","#ff8a00","#7a5a45","#f2d7b0");
if(t==="sage") apply("#eef5ef","#fff","#233325","#5c8d5c","#607060","#d9e7da");
if(t==="dark") apply("#181818","#242424","#fff","#d4a017","#bbb","#333");

localStorage.setItem("theme",t);
vibrate(20);
}

function apply(bg,card,text,accent,sub,btn){
document.documentElement.style.setProperty("--bg",bg);
document.documentElement.style.setProperty("--card",card);
document.documentElement.style.setProperty("--text",text);
document.documentElement.style.setProperty("--accent",accent);
document.documentElement.style.setProperty("--sub",sub);
document.documentElement.style.setProperty("--button",btn);
}

function toggleTheme(){
document.getElementById("themePopup").style.display =
document.getElementById("themePopup").style.display==="block"?"none":"block";
}

/* =========================
USER ENTRY FIXED
========================= */

function enterApp(user){
currentUser=user;
vibrate(40);

document.getElementById("mainPage").classList.add("active");
document.getElementById("landingPage").classList.remove("active");

document.getElementById("userTitle").innerText="🍲 "+user+" is cooking today";
}

/* =========================
MODAL FIXED
========================= */

function openAbout(){
document.getElementById("aboutModal").style.display="flex";
vibrate(10);
}

function closeAbout(){
document.getElementById("aboutModal").style.display="none";
}

/* =========================
INIT RESTORE FIX
========================= */

window.onload=()=>{

let t=localStorage.getItem("theme")||"nothing";
setTheme(t);

};

</script>

</body>
</html>
