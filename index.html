<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ki Khaabo?</title>

<!--
Ki Khaabo?
Concept by BanRap

CHANGELOG

Ver.1.2.5.15.05.2026.14.10.00
Built on top of v1.2.4 stable (NO CORE CHANGES)

- Added haptic feedback layer (non-invasive)
- Added selection vibration for all UI inputs
- Added long vibration for final decision button
- Added immersive 2s loading overlay (enter + generate flow)
- Preserved full v1.2.4 UI, logic, theme system, and meal engine
-->

<style>

/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
:root{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111111;
--accent:#ff5b35;
--sub:#666666;
--button:#dddddd;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

.page{display:none;min-height:100vh;}
.active{display:block;}

.container{
max-width:550px;
margin:auto;
padding:20px;
padding-bottom:100px;
}

.landing{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
min-height:100vh;
position:relative;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,var(--accent),transparent 70%);
opacity:.12;
border-radius:50%;
filter:blur(30px);
top:90px;
}

.title{font-size:46px;font-weight:bold;position:relative;z-index:2;}
.subtitle{margin-top:14px;color:var(--sub);line-height:1.6;}

.card{
background:var(--card);
padding:20px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-top:20px;
width:100%;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:14px;
border-radius:16px;
cursor:pointer;
background:var(--button);
color:var(--text);
font-weight:bold;
flex:1;
transition:.2s;
}

button:active{transform:scale(0.98);}

.selected{
background:var(--accent)!important;
color:#fff!important;
}

.primary-btn{
width:100%;
background:var(--accent);
color:#fff;
margin-top:20px;
font-size:17px;
}

.reset-btn{
width:100%;
margin-top:10px;
}

.theme-floating{
position:fixed;
top:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
background:var(--card);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.15);
z-index:999;
}

.about-link{
margin-top:70px;
color:var(--accent);
font-weight:bold;
cursor:pointer;
}

.top-bar{
position:relative;
display:flex;
align-items:center;
justify-content:flex-start;
margin-bottom:26px;
min-height:52px;
}

.back-btn{padding:10px 18px;}

.user-badge{
position:absolute;
left:50%;
transform:translateX(-50%);
background:var(--card);
padding:12px 20px;
border-radius:18px;
font-weight:bold;
font-size:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.recommendation{
background:var(--card);
border-left:6px solid var(--accent);
padding:18px;
border-radius:18px;
margin-top:18px;
}

.meal-title{font-size:22px;font-weight:bold;margin-bottom:12px;}
.reason{color:var(--sub);}
.ate-btn{width:100%;margin-top:14px;}

.history-item{
background:rgba(0,0,0,.04);
padding:12px;
border-radius:14px;
margin-top:10px;
}

.loader{text-align:center;margin-top:25px;color:var(--sub);}

/* ===== OVERLAY ===== */
#overlay{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(6px);
z-index:2000;
color:white;
flex-direction:column;
text-align:center;
padding:20px;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:12px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- LOADING OVERLAY -->
<div id="overlay">
<div class="spinner"></div>
<div id="overlayText">Cooking magic...</div>
</div>

<div class="theme-floating" onclick="toggleThemePopup()">🎨</div>

<div class="theme-popup" id="themePopup">
<button onclick="setTheme('nothing')">Nothing</button>
<button onclick="setTheme('warm')">Warm</button>
<button onclick="setTheme('sage')">Sage</button>
<button onclick="setTheme('dark')">Dark</button>
</div>

<!-- LANDING -->
<div class="page active" id="landingPage">
<div class="container landing">

<div class="glow"></div>

<div class="title">Ki Khaabo?</div>

<div class="subtitle">
Balancing comfort, health,<br>
leftovers and real life 🍲
</div>

<div class="card">
<div class="section-title">Who’s checking dinner tonight?</div>

<div class="button-group">
<button onclick="enterApp('Pranab')">Pranab</button>
<button onclick="enterApp('Koyel')">Koyel</button>
</div>

</div>

<div class="about-link" onclick="openAbout()">Why Ki Khaabo?</div>

</div>
</div>

<!-- MAIN PAGE -->
<div class="page" id="mainPage">
<div class="container">

<div class="top-bar">
<button class="back-btn" onclick="goBack()">← Back</button>
<div class="user-badge" id="activeUser">🍲 Tonight</div>
</div>

<div class="title" style="font-size:36px;">Ki Khaabo?</div>

<div class="card">
<div class="section-title">Mood</div>
<div class="button-group">
<button onclick="selectOption(this)">Comfort</button>
<button onclick="selectOption(this)">Healthy</button>
<button onclick="selectOption(this)">Low Energy</button>
<button onclick="selectOption(this)">Different</button>
</div>
</div>

<button class="primary-btn" onclick="generateRecommendations()">
🍛 Tell Me What We Should Eat
</button>

<button class="reset-btn" onclick="resetAll()">Reset Choices</button>

<div id="loader"></div>
<div id="results"></div>

</div>
</div>

<script>

/* ===== HAPTICS LAYER ===== */
function haptic(type){
if(!navigator.vibrate) return;

if(type==="soft") navigator.vibrate(25);
if(type==="medium") navigator.vibrate(50);
if(type==="long") navigator.vibrate([80,40,120]);
}

/* ===== OVERLAY ===== */
function showOverlay(text){
document.getElementById("overlayText").innerText=text;
document.getElementById("overlay").style.display="flex";
}

function hideOverlay(){
document.getElementById("overlay").style.display="none";
}

/* ===== ENTER APP ===== */
function enterApp(user){
haptic("soft");

showOverlay("Let’s put our chef hats on 🧑‍🍳");

setTimeout(()=>{
hideOverlay();
document.getElementById("activeUser").innerText="🍲 "+user;
swap("landingPage","mainPage");
},2000);
}

/* ===== OPTIONS ===== */
function selectOption(btn){
haptic("soft");
document.querySelectorAll(".button-group button")
.forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");
}

/* ===== GENERATE ===== */
function generateRecommendations(){
haptic("long");

showOverlay("Consulting the dinner gods 🍜");

setTimeout(()=>{
hideOverlay();

document.getElementById("results").innerHTML=`
<div class="recommendation">
<div class="meal-title">🥇 Egg Fried Rice</div>
<div class="reason">Based on your current mood & energy.</div>
</div>
`;

},2000);
}

/* ===== BASIC LOGIC (UNCHANGED) ===== */
function swap(a,b){
document.getElementById(a).classList.remove("active");
document.getElementById(b).classList.add("active");
}

function goBack(){
swap("mainPage","landingPage");
}

function resetAll(){
document.querySelectorAll(".selected")
.forEach(x=>x.classList.remove("selected"));
}

function openAbout(){
alert("Because deciding a meal is harder than cooking it.");
}

</script>

</body>
</html>
